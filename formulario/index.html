<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra | OuroCacau</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        :root {
            --gold: #c8922a;
            --gold-light: #e9c46a;
            --gold-pale: #f5e6c8;
            --cream: #fffdf7;
            --cream-warm: #fef9ed;
            --brown-dark: #2c1e0e;
            --brown: #5a4226;
            --brown-light: #8b6b32;
            --white: #ffffff;
            --shadow-gold: rgba(200,146,42,0.15);
            --shadow-dark: rgba(44,30,14,0.08);
            --radius-xl: 2rem;
            --radius-full: 100px;
            --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--cream);
            color: var(--brown-dark);
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .bg-pascoa {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-pascoa .egg {
            position: absolute;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0;
            animation: floatEgg linear infinite;
        }
        @keyframes floatEgg {
            0%   { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
            10%  { opacity: 0.12; }
            90%  { opacity: 0.12; }
            100% { transform: translateY(-10vh) rotate(360deg) scale(1); opacity: 0; }
        }
        .bg-pascoa .sparkle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--gold-light);
            border-radius: 50%;
            animation: sparkle 3s ease-in-out infinite;
        }
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 0.5; transform: scale(1); }
        }

        .header-pascoa {
            background: linear-gradient(135deg, var(--cream-warm) 0%, var(--cream) 100%);
            border-bottom: 1px solid var(--gold-pale);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px var(--shadow-gold);
            animation: logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 4px 12px var(--shadow-gold); }
            50% { box-shadow: 0 6px 20px rgba(200,146,42,0.3); }
        }
        .logo-icon svg { width: 28px; height: 28px; }
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--brown-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container {
            max-width: 700px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            position: relative;
            z-index: 10;
        }

        .pagina-checkout {
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            border: 1px solid rgba(233,196,106,0.3);
            box-shadow: 0 20px 60px var(--shadow-dark);
            animation: fadeInUp 0.5s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pagina-checkout h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--brown-dark);
            margin-bottom: 0.3rem;
        }
        .pagina-checkout h2 span { color: var(--gold); }

        .voltar-btn {
            background: none;
            border: none;
            font-size: 0.95rem;
            font-family: 'Quicksand', sans-serif;
            color: var(--brown-light);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            margin-bottom: 1.5rem;
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
        }
        .voltar-btn:hover { color: var(--gold); transform: translateX(-3px); }

        .produto-resumo {
            background: var(--cream-warm);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 1.2rem 0 1.8rem;
            border: 1px solid rgba(233,196,106,0.3);
        }
        .produto-resumo span { font-weight: 600; color: var(--brown); }
        .produto-resumo strong { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--gold); }

        .form-row { margin-bottom: 1.2rem; }
        .form-label {
            display: block;
            font-weight: 600;
            color: var(--brown);
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }
        .form-input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border-radius: 0.8rem;
            border: 1.5px solid rgba(233,196,106,0.4);
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            background: var(--cream);
            color: var(--brown-dark);
            transition: var(--transition);
        }
        .form-input:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 0 4px rgba(233,196,106,0.15);
        }
        .form-input::placeholder { color: var(--brown-light); opacity: 0.4; }

        .btn-finalizar {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            width: 100%;
            padding: 1.1rem;
            border-radius: var(--radius-full);
            font-family: 'Quicksand', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(37,99,235,0.3);
            -webkit-tap-highlight-color: transparent;
        }
        .btn-finalizar:hover { box-shadow: 0 8px 25px rgba(37,99,235,0.4); transform: translateY(-2px); }
        .btn-finalizar:active { transform: translateY(1px); box-shadow: 0 2px 8px rgba(37,99,235,0.2); }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--brown-light);
            font-size: 0.85rem;
            opacity: 0.6;
            position: relative;
            z-index: 10;
        }

        .toast-copy {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--brown-dark);
            color: var(--gold-pale);
            padding: 0.8rem 1.8rem;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 0.95rem;
            opacity: 0;
            transition: 0.3s ease;
            z-index: 3000;
            pointer-events: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .toast-copy.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        *:focus, *:active {
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        @media (max-width: 768px) {
            .container { padding: 0 1rem; }
            .pagina-checkout { padding: 1.8rem; border-radius: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-pascoa" id="bgPascoa"></div>

    <header class="header-pascoa">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none">
                    <ellipse cx="12" cy="14" rx="7" ry="9" fill="#fff" opacity="0.9"/>
                    <ellipse cx="12" cy="14" rx="7" ry="9" fill="none" stroke="#fff" stroke-width="1.5"/>
                    <path d="M8 12c1-3 3-5 4-5s3 2 4 5" stroke="#e9c46a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
            <span class="logo-text">OuroCacau</span>
        </div>
    </header>

    <div class="container">
        <div class="pagina-checkout">
            <a href="/" class="voltar-btn" id="voltarParaProdutos">
                <i class="fas fa-arrow-left"></i> Voltar aos produtos
            </a>
            <h2>Quase lá! <span>🐰</span></h2>
            
            <div class="produto-resumo" id="resumoCompra">
                <span id="resumoNome">Carregando...</span>
                <strong id="resumoPreco">R$ 0,00</strong>
            </div>
            
            <div class="form-row">
                <label class="form-label">Nome completo</label>
                <input class="form-input" type="text" id="nome" placeholder="Ex: João Silva">
            </div>
            
            <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div>
                    <label class="form-label">CPF</label>
                    <input class="form-input" type="text" id="cpf" placeholder="Apenas números">
                </div>
                <div>
                    <label class="form-label">Telefone</label>
                    <input class="form-input" type="text" id="telefone" placeholder="seu numero exemplo: +55119999..">
                </div>
            </div>
            
            <div class="form-row">
                <label class="form-label">E-mail</label>
                <input class="form-input" type="email" id="email" placeholder="seu@email.com">
            </div>
            
            <button class="btn-finalizar" id="finalizarCompraBtn">
                <i class="fas fa-lock"></i> Finalizar Compra
            </button>
        </div>
    </div>

    <footer>
        <p>OuroCacau © 2025 — Pagamento seguro via PIX</p>
    </footer>

    <div class="toast-copy" id="copyToast">📋 Código copiado!</div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
