<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - OuroCacau</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1E1E1E;
            --bg-accent: #2C2C2C;
            --gold: #D4AF37;
            --blue: #2A4B7C;
            --off-white: #F5F5F5;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--off-white);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background-color: var(--bg-accent);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--gold);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: var(--off-white);
        }

        .bunny-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 2rem;
        }

        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--blue);
            color: var(--off-white);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: transform 0.3s ease, background-color 0.3s ease;
            border: 1px solid var(--gold);
        }

        .btn-home:hover {
            transform: scale(1.05);
            background-color: #365e9b;
        }

        /* Bunny Animation */
        @keyframes hop {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes nose-twitch {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .bunny-svg {
            width: 100%;
            height: 100%;
            animation: hop 1.5s ease-in-out infinite;
        }

        .nose {
            animation: nose-twitch 0.5s infinite;
            transform-origin: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="bunny-container">
            <svg class="bunny-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Ears -->
                <ellipse cx="35" cy="25" rx="8" ry="20" fill="#F5F5F5" transform="rotate(-10 35 25)" />
                <ellipse cx="65" cy="25" rx="8" ry="20" fill="#F5F5F5" transform="rotate(10 65 25)" />
                <ellipse cx="35" cy="25" rx="4" ry="12" fill="#FFC0CB" transform="rotate(-10 35 25)" />
                <ellipse cx="65" cy="25" rx="4" ry="12" fill="#FFC0CB" transform="rotate(10 65 25)" />
                
                <!-- Head -->
                <circle cx="50" cy="55" r="25" fill="#F5F5F5" />
                
                <!-- Eyes -->
                <circle cx="40" cy="50" r="3" fill="#2C2C2C" />
                <circle cx="60" cy="50" r="3" fill="#2C2C2C" />
                
                <!-- Nose -->
                <path class="nose" d="M48 58 L52 58 L50 61 Z" fill="#FFC0CB" />
                
                <!-- Mouth -->
                <path d="M45 65 Q50 70 55 65" stroke="#2C2C2C" stroke-width="1" fill="none" />

                <!-- Gold Accessory (Bowtie) -->
                <path d="M42 75 L58 85 L58 75 L42 85 Z" fill="#D4AF37" />
            </svg>
        </div>

        <h1>404</h1>
        <p>Ops! O Coelho da Páscoa levou esta página para esconder em algum lugar...</p>
        
        <a href="index.html" class="btn-home">Voltar ao Início</a>
    </div>

</body>
</html>
